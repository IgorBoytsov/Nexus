syntax = "proto3";

package rebout.nexus.authentication.v1;

option csharp_namespace = "Rebout.Nexus.Contracts.Authentication.V1";

// Requests
message SrpChallengeRequest {
  string login = 1;
}

message SrpVerifyRequest {
  string login = 1;
  string a = 2;
  string m1 = 3;
}

message RefreshTokenRequest {
  string access_token = 1;
  string refresh_token = 2;
}

message TokenLoginRequest {
  string refresh_token = 1;
}

// Responses
message SrpChallengeResponse {
  string salt = 1;
  string b = 2;
}

message AuthResponse {
  string access_token = 1;
  string refresh_token = 2;
  optional string m2 = 3;
}
